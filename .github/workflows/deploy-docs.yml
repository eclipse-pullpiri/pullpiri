# ==============================================================================
# Documentation CI/CD for Eclipse Pullpiri
#
# - On push to main : Build (strict) + deploy to gh-pages branch
# - On pull_request : Build (strict) only, and upload site as an artifact
# - Manual trigger  : Available via "Run workflow" button
# ==============================================================================
name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'doc/**'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'doc/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Job 1: Build (always) — validates that docs compile cleanly.
  # ============================================================================
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: doc/requirements.txt

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r doc/requirements.txt

      # Strict mode fails on broken links / missing nav items / etc.
      - name: Build MkDocs site (strict mode)
        run: mkdocs build --strict --config-file doc/mkdocs.yml

      - name: Upload built site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: site/
          retention-days: 7

  # ============================================================================
  # Job 2: Deploy to GitHub Pages (main branch only)
  # ============================================================================
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: doc/requirements.txt

      - name: Install documentation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r doc/requirements.txt

      - name: Configure Git user
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy to gh-pages branch
        run: mkdocs gh-deploy --force --config-file doc/mkdocs.yml
