apiVersion: v1
kind: Scenario
metadata:
  name: helloworld
spec:
  condition: null
  action: launch
  target: helloworld
---
apiVersion: v1
kind: Package
metadata:
  label: null
  name: helloworld
spec:
  schedule: schedule_helloworld
  pattern:
    - type: plain
  policy: policy_helloworld
  models:
    - name: helloworld
      node: HPC
      resources:
        volume:
        network:
---
apiVersion: v1
kind: Schedule
metadata:
  name: schedule_helloworld
spec:
  - name: p1_0
    priority: 20
    policy: FIFO
    cpu_affinity: 4026531840
    period: 10000
    release_time: 0
    runtime: 3000
    deadline: 10000
    node_id: perf_node
    max_dmiss: 3
---
apiVersion: v1
kind: Policy
metadata:
  name: policy_helloworld
spec:
  placement:
    availableNodes:
      - HPC
  procedure:
    type: realtime
    strategy: stop
    trigger:
      deadlineMissThreshold:
        count: 5
---
apiVersion: v1
kind: Model
metadata:
  name: helloworld
  annotations:
    io.pullpiri.annotations.package-type: helloworld
    io.pullpiri.annotations.package-name: helloworld
    io.pullpiri.annotations.package-network: default
  labels:
    app: helloworld
spec:
  hostNetwork: true
  containers:
    - name: helloworld
      image: quay.io/podman/hello:latest
  terminationGracePeriodSeconds: 0
