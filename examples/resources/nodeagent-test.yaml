apiVersion: v1
kind: Scenario
metadata:
  name: helloworld
spec:
  condition: null
  action: launch
  target: helloworld
---
apiVersion: v1
kind: Package
metadata:
  label: null
  name: helloworld
spec:
  pattern:
    - type: plain
  models:
    - name: helloworld
      node: HPC
      resources:
        volume:
        network:
---
apiVersion: v1
kind: Pod
metadata:
  name: gpu-pod
spec:
  hostNetwork: true
  containers:
  - name: gpu-app
    image: localhost/test-con:latest
    command: ["/bin/sh"]
    args: ["-c", "nvidia-smi"]
    workingDir: /app
    stdin: true
    tty: true
    ports:
    - containerPort: 8080
      hostPort: 8080
    env:
    - name: MY_VAR
      value: "test"
    resources:
      limits:
        cpu: "2"
        memory: "1Gi"
        nvidia.com/gpu: "1"
    securityContext:
      privileged: false
      runAsUser: 1000
      runAsGroup: 1000
      capabilities:
        add: ["NET_ADMIN"]
        drop: ["ALL"]
    volumeMounts:
    - name: data
      mountPath: /data
  volumes:
  - name: data
    hostPath:
      path: /host/data
  terminationGracePeriodSeconds: 0
