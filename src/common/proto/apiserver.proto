syntax = "proto3";

package apiserver;

service ApiServerService {
  rpc GetNodes(GetNodesRequest) returns (GetNodesResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);
  rpc RegisterNode(NodeRegistrationRequest) returns (NodeRegistrationResponse);
  rpc GetTopology(GetTopologyRequest) returns (GetTopologyResponse);
  rpc UpdateTopology(UpdateTopologyRequest) returns (UpdateTopologyResponse);
}

message GetNodesRequest {
  optional string filter = 1;
}

message GetNodesResponse {
  repeated Node nodes = 1;
}

message GetNodeRequest {
  string node_id = 1;
}

message GetNodeResponse {
  Node node = 1;
}

message NodeRegistrationRequest {
  string node_id = 1;
  string hostname = 2;
  string ip_address = 3;
  NodeRole role = 4;
  ResourceInfo resources = 5;
  Credentials credentials = 6;
}

message NodeRegistrationResponse {
  string node_id = 1;
  ClusterInfo cluster_info = 2;
  NodeStatus status = 3;
  bool success = 4;
  optional string error_message = 5;
}

message GetTopologyRequest {}

message GetTopologyResponse {
  ClusterTopology topology = 1;
}

message UpdateTopologyRequest {
  ClusterTopology topology = 1;
}

message UpdateTopologyResponse {
  ClusterTopology updated_topology = 1;
  bool success = 2;
  optional string error_message = 3;
}

// Supporting types
enum NodeRole {
  MASTER = 0;
  SUB = 1;
}

enum NodeStatus {
  PENDING = 0;
  INITIALIZING = 1;
  READY = 2;
  NOT_READY = 3;
  MAINTENANCE = 4;
  TERMINATING = 5;
}

message Node {
  string id = 1;
  string name = 2;
  string ip = 3;
  NodeRole role = 4;
  NodeStatus status = 5;
  ResourceInfo resources = 6;
  int64 created_at = 7;
  int64 last_heartbeat = 8;
}

message ResourceInfo {
  uint32 cpu_cores = 1;
  uint64 memory_mb = 2;
  uint64 disk_gb = 3;
}

message Credentials {
  string token = 1;
  string certificate = 2;
}

message ClusterInfo {
  string cluster_id = 1;
  string cluster_name = 2;
  string master_endpoint = 3;
}

message ClusterTopology {
  string id = 1;
  string name = 2;
  TopologyType type = 3;
  repeated Node master_nodes = 4;
  repeated Node sub_nodes = 5;
  optional string parent_cluster = 6;
  map<string, string> config = 7;
}

enum TopologyType {
  BASIC_EMBEDDED = 0;
  EDGE_CLOUD_HYBRID = 1;
  MULTI_EMBEDDED = 2;
  REGIONAL_DISTRIBUTED = 3;
}